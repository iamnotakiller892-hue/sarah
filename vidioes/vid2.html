/* HEADER */
.header{
    background:linear-gradient(135deg,#111,#1f1f1f);
    padding:25px;
    text-align:center;
    border-bottom:1px solid #333;
}

.header h1{
    font-size:32px;
    color:#fff;
    margin-bottom:10px;
}

.header p{
    color:#aaa;
}

/* GRID VIDEO */
.container{
    max-width:1400px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:25px;
}

/* CARD */
.card{
    background:#181818;
    border-radius:15px;
    overflow:hidden;
    transition:.3s;
    box-shadow:0 5px 15px rgba(0,0,0,.4);
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 10px 25px rgba(0,0,0,.6);
}

/* VIDEO */
video{
    width:100%;
    display:block;
    aspect-ratio:16/9;
    background:black;
}

/* TITLE */
.title{
    padding:15px;
    font-size:16px;
    font-weight:600;
}

/* BUTTON */
.download-btn{
    display:block;
    text-align:center;
    margin:0 15px 15px;
    padding:12px;
    border-radius:10px;
    text-decoration:none;
    background:linear-gradient(45deg,#00c853,#25D366);
    color:white;
    font-weight:bold;
    transition:.3s;
}

.download-btn:hover{
    transform:scale(1.03);
}

/* WHATSAPP */
.wa-float{
    position:fixed;
    width:60px;
    height:60px;
    bottom:20px;
    right:20px;
    z-index:9999;
}

.wa-float img{
    width:100%;
    border-radius:50%;
    box-shadow:0 5px 15px rgba(0,0,0,.4);
}

.wa-float:hover{
    transform:scale(1.1);
}

/* MOBILE */
@media(max-width:768px){

    .header h1{
        font-size:24px;
    }

    .container{
        grid-template-columns:1fr;
        padding:15px;
    }
}
#progress{
    position:fixed;
    top:0;
    left:0;
    height:4px;
    width:0%;
    background:#25D366;
    z-index:99999;
}
